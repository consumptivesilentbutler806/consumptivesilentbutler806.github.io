<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to the team</title>
    <!-- Import sharp, aggressive font perfect for motorsport (Oswald) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styles using Team Colors: Black & White */
        body {
            font-family: 'Oswald', Arial, sans-serif;
            margin: 0;
            padding: 50px;
            background-color: #000000; /* Pure Black Background */
            color: #ffffff; /* Pure White Text */
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            font-weight: 700;
            font-style: italic;
            margin-bottom: 10px;
            letter-spacing: -1px;
            color: #ffffff;
            border-left: 5px solid #Da2e29; /* Custom Team Red Accent */
            padding-left: 15px;
        }

        p {
            font-size: 1.1rem;
            color: #a0a0a0; /* Muted light gray for readable structure description */
            text-transform: uppercase;
            letter-spacing: 2px;
            padding-left: 20px;
        }

        /* Hamburger Menu Button */
        .menu-btn {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            position: fixed;
            top: 30px;
            right: 40px;
            z-index: 1001;
            color: #ffffff;
            transition: transform 0.2s ease, color 0.2s ease;
        }
        
        .menu-btn:hover {
            transform: scale(1.1);
            color: #Da2e29; /* Team Red glow on hover */
        }

        /* Transparent Side Panel (Glassmorphism over Black) */
        .side-panel {
            height: 100%;
            width: 300px;
            position: fixed;
            z-index: 1000;
            top: 0;
            right: -320px; /* Hidden off-screen */
            
            /* Semi-transparent pure black overlay + futuristic blur effect */
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: hidden;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding-top: 80px;
        }

        /* Side Panel Links */
        .side-panel a {
            padding: 18px 30px;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
            font-style: italic;
            text-transform: uppercase;
            color: #ffffff;
            display: block;
            letter-spacing: 1px;
            transition: 0.2s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Hover effect - Speed line accent in Team Red */
        .side-panel a:hover {
            color: #Da2e29; /* Team Red text highlight */
            background: rgba(255, 255, 255, 0.02);
            padding-left: 40px; /* Kinetic forward nudge */
            border-bottom: 1px solid rgba(218, 46, 41, 0.3); /* Soft red underline glow */
        }

        /* Close Button styling */
        .side-panel .close-btn {
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 28px;
            cursor: pointer;
            color: #a0a0a0;
            transition: color 0.2s;
        }

        .side-panel .close-btn:hover {
            color: #ffffff;
        }

        /* Active state for the panel */
        .side-panel.open {
            right: 0;
        }
    </style>
</head>
<body>

    <!-- Menu Trigger Button -->
    <button class="menu-btn" onclick="toggleNav()">☰ MENU</button>

    <!-- Pop-out Side Panel -->
    <div id="mySidepanel" class="side-panel">
        <span class="close-btn" onclick="toggleNav()">&times;</span>
        <a href="about.html">About the team</a>
        <a href="departments.html">Departments</a>
        <a href="sponsors.html">Sponsors</a>
        <a href="timeline.html">Timeline</a>
        <a href="contact.html">Contact us</a>
    </div>

    <!-- Main Content Area -->
    <main>
        <h1>Welcome to the team</h1>
        <p>// Currently under construction.</p>
    </main>

    <script>
        function toggleNav() {
            const panel = document.getElementById("mySidepanel");
            panel.classList.toggle("open");
        }
    </script>

</body>
</html>
